<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fake Profile & Bot Detector</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <div class="text-center">

            <h1 class="fw-bold">
                🤖 Fake Profile & Bot Detector
            </h1>

            <p class="text-muted">
                Upload a social media profile screenshot and let AI analyze it.
            </p>

        </div>

        <hr>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Upload Profile Screenshot
                </label>

                <input
                    type="file"
                    name="profile_image"
                    class="form-control"
                    accept="image/*"
                    required
                >

            </div>

            <div class="d-grid">

                <button
                    type="submit"
                    class="btn btn-primary btn-lg"
                >
                    Analyze Profile
                </button>

            </div>

        </form>

    </div>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card text-center shadow-sm">

                <div class="card-body">

                    <h5>🔍 OCR Analysis</h5>

                    <p>
                        Extracts followers, posts and following count.
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow-sm">

                <div class="card-body">

                    <h5>🧠 Machine Learning</h5>

                    <p>
                        Random Forest model predicts fake or real profiles.
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow-sm">

                <div class="card-body">

                    <h5>🛡 Cybersecurity</h5>

                    <p>
                        Detects suspicious activity and scam indicators.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
